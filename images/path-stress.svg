<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3F0F9"/>
      <stop offset="50%" style="stop-color:#F3E5E9"/>
      <stop offset="100%" style="stop-color:#DDA7A5;stop-opacity:0.4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#7E6EAA;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7E6EAA;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="240" rx="300" ry="250" fill="url(#glow1)"/>
  <!-- Flowing breath lines -->
  <path d="M150 350 Q300 280 400 300 Q500 320 650 280" stroke="#7E6EAA" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M100 380 Q280 310 400 340 Q520 370 700 310" stroke="#DDA7A5" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M130 410 Q310 340 420 360 Q530 380 680 340" stroke="#7E6EAA" stroke-width="1.5" fill="none" opacity="0.15"/>
  <!-- Hands in releasing pose -->
  <circle cx="400" cy="260" r="80" fill="#7E6EAA" opacity="0.08"/>
  <circle cx="400" cy="260" r="50" fill="#DDA7A5" opacity="0.1"/>
  <circle cx="400" cy="260" r="25" fill="#7E6EAA" opacity="0.12"/>
  <!-- Floating particles -->
  <circle cx="250" cy="200" r="4" fill="#DDA7A5" opacity="0.4"/>
  <circle cx="530" cy="180" r="3" fill="#7E6EAA" opacity="0.3"/>
  <circle cx="350" cy="150" r="5" fill="#DDA7A5" opacity="0.25"/>
  <circle cx="480" cy="320" r="3" fill="#7E6EAA" opacity="0.35"/>
  <circle cx="300" cy="350" r="4" fill="#DDA7A5" opacity="0.2"/>
  <circle cx="550" cy="250" r="6" fill="#7E6EAA" opacity="0.15"/>
</svg>